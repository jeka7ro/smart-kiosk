services:
  # Backend Express Service
  - type: web
    name: smart-kiosk-backend
    env: node
    rootDir: packages/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: smart-kiosk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: smart-kiosk-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

# PostgreSQL Database
databases:
  - name: smart-kiosk-db
    databaseName: smartkiosk
    user: admin

# Redis for Socket.io/Cache
- type: redis
  name: smart-kiosk-redis
  plan: free # Use paid plan for production persistence
