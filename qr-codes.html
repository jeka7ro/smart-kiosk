<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <title>QR Codes — Smart Kiosk</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
    h1 { text-align: center; margin-bottom: 6px; font-size: 1.3rem; }
    p.sub { text-align: center; color: #666; margin-bottom: 20px; font-size: 0.85rem; }
    .controls {
      display: flex; gap: 10px; justify-content: center; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap; background: white;
      padding: 14px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    label { font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
    input[type=text]   { padding: 7px 10px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 0.85rem; width: 190px; }
    input[type=number] { padding: 7px 10px; border: 1.5px solid #ccc; border-radius: 7px; font-size: 0.85rem; width: 65px; }
    button { background: #2563EB; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.88rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    button.print-btn { background: #059669; }

    .brand-section { margin-bottom: 32px; }
    .brand-title {
      font-size: 1.1rem; font-weight: 700; padding: 8px 18px;
      border-radius: 8px; display: inline-block; margin-bottom: 14px; color: #fff;
    }
    .smashme  { background: #EE3B24; }
    .sushi    { background: #c0392b; }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 14px;
    }
    .qr-card {
      background: white; border-radius: 12px; padding: 14px 10px 10px;
      text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      page-break-inside: avoid; break-inside: avoid;
    }
    .qr-card img { width: 125px; height: 125px; display: block; margin: 0 auto; }
    .qr-card .table-num { margin-top: 8px; font-weight: 800; font-size: 1rem; }
    .qr-card .qr-url {
      font-size: 0.62rem; color: #888; margin-top: 3px;
      word-break: break-all; line-height: 1.3;
    }

    @media print {
      body { background: white; padding: 0; }
      .controls, h1, p.sub { display: none; }
      .qr-grid { grid-template-columns: repeat(5, 1fr); gap: 10px; }
      .brand-section { margin-bottom: 24px; }
    }
  </style>
</head>
<body>
  <h1>📱 QR Codes — Smart Kiosk</h1>
  <p class="sub">Scanează cu telefonul pentru a comanda de la masă</p>

  <div class="controls">
    <label>Backend URL: <input type="text" id="backend" value="http://localhost:4000"/></label>
    <label>QR App URL:  <input type="text" id="qrapp"   value="http://localhost:3013"/></label>
    <label>Nr. mese:    <input type="number" id="tables" value="10" min="1" max="50"/></label>
    <button onclick="generate()">🔄 Generează</button>
    <button class="print-btn" onclick="window.print()">🖨️ Printează</button>
  </div>

  <div id="output"></div>

  <script>
    const BRANDS = [
      { id: 'smashme',    name: '🍔 SmashMe',     cls: 'smashme' },
      { id: 'sushimaster',name: '🍣 SushiMaster',  cls: 'sushi'   },
    ];

    function generate() {
      const backend = document.getElementById('backend').value.trim().replace(/\/$/, '');
      const qrapp   = document.getElementById('qrapp').value.trim().replace(/\/$/, '');
      const tables  = parseInt(document.getElementById('tables').value) || 10;

      let html = '';
      for (const brand of BRANDS) {
        html += `<div class="brand-section">
          <div class="brand-title ${brand.cls}">${brand.name}</div>
          <div class="qr-grid">`;

        for (let t = 1; t <= tables; t++) {
          // Use img src directly — no fetch() needed, works from file://
          const imgSrc = `${backend}/api/qr/image?brand=${brand.id}&table=${t}&loc=1`;
          const qrUrl  = `${qrapp}?brand=${brand.id}&table=${t}&loc=1`;
          html += `
            <div class="qr-card">
              <img src="${imgSrc}" alt="QR Masa ${t}" loading="lazy"/>
              <div class="table-num">Masa ${t}</div>
              <div class="qr-url">${qrUrl}</div>
            </div>`;
        }
        html += `</div></div>`;
      }
      document.getElementById('output').innerHTML = html;
    }

    window.addEventListener('load', generate);
  </script>
</body>
</html>
